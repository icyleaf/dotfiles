---
keys:
  - &main age1r7hzm4zqsyu880e3f8yn97g7d6jqtxaeg8jjk2xpzqv2d9zgkelq00nmxn
creation_rules:
  # Secret Profiles: environment variables and SSH private keys per device
  # Encrypt with: age -r <pubkey> -o secrets/profiles/<profile>/local.zsh.age <plaintext>
  # Decrypt with: age -d -i ~/.local/share/age/default-key.txt <file>.age
  - path_regex: secrets/.+\.age$
    age: *main

  # Legacy: zsh encrypted env files (dotenv-style, use --input-type/--output-type dotenv)
  # See: https://github.com/getsops/sops/issues/982
  - path_regex: config/general/zsh/.*.enc.zsh
    unencrypted-regex: '^(PATH|LDFLAGS|CPPFLAGS)$'
    age: *main
    pgp: ''
stores:
  yaml:
    indent: 2
