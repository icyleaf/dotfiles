# Keyboard Bindings — Linux
# Modifier: alt (not standard Linux terminal convention)

# Clipboard
keybind = control+insert=copy_to_clipboard
keybind = shift+insert=paste_from_clipboard
keybind = alt+c=copy_to_clipboard
keybind = alt+v=paste_from_clipboard

# Font size
keybind = alt+equal=increase_font_size:1
keybind = alt+minus=decrease_font_size:1
keybind = alt+0=reset_font_size

# Navigation
keybind = alt+k=clear_screen
keybind = alt+t=new_tab
keybind = alt+w=close_surface

# Split management
keybind = alt+d=new_split:right
keybind = alt+shift+d=new_split:down
keybind = alt+shift+z=toggle_split_zoom

# Split navigation
keybind = alt+arrow_left=goto_split:left
keybind = alt+arrow_right=goto_split:right
keybind = alt+arrow_up=goto_split:up
keybind = alt+arrow_down=goto_split:down

# Split resize
keybind = super+control+shift+alt+arrow_down=resize_split:down,100
keybind = super+control+shift+alt+arrow_up=resize_split:up,100
keybind = super+control+shift+alt+arrow_left=resize_split:left,100
keybind = super+control+shift+alt+arrow_right=resize_split:right,100

# Tab navigation
keybind = alt+1=goto_tab:1
keybind = alt+2=goto_tab:2
keybind = alt+3=goto_tab:3
keybind = alt+4=goto_tab:4
keybind = alt+5=goto_tab:5
keybind = alt+6=goto_tab:6
keybind = alt+7=goto_tab:7
keybind = alt+8=goto_tab:8
keybind = alt+9=goto_tab:9

# Quick tab cycling
keybind = alt+tab=next_tab
keybind = alt+shift+tab=previous_tab
