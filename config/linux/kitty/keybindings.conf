# Kitty CheatSheet
# https://gist.github.com/AskinNet/0d0d4f7f0ee221f8362af9d9876d021a

# tab management
map kitty_mod+t     new_tab

map kitty_mod+1     goto_tab 1
map kitty_mod+2     goto_tab 2
map kitty_mod+3     goto_tab 3
map kitty_mod+4     goto_tab 4
map kitty_mod+5     goto_tab 5
map kitty_mod+6     goto_tab 6
map kitty_mod+7     goto_tab 7
map kitty_mod+8     goto_tab 8
map kitty_mod+9     goto_tab 9
map kitty_mod+0     goto_tab 10
map kitty_mod+`     goto_tab -1

# layout management
map kitty_mod+=     toggle_layout stack
map kitty_mod+-     launch --location=hsplit --cwd=current
map kitty_mod+\     launch --location=vsplit --cwd=current

map kitty_mod+j     previous_window
map kitty_mod+k     next_window

# clipboard management
map ctrl+shift+c    copy_to_clipboard
map ctrl+shift+v    paste_from_clipboard

# scrolling

map ctrl+up        scroll_line_up
map ctrl+k         scroll_line_up
map ctrl+down      scroll_line_down
map ctrl+j         scroll_line_down
map ctrl+page_up   scroll_page_up
map ctrl+h         scroll_page_up
map ctrl+page_down scroll_page_down
map ctrl+l         scroll_page_down
map ctrl+home      scroll_home
map ctrl+end       scroll_end
map kitty_mod+h    show_scrollback

# search
map kitty_mod+/    launch --stdin-source=@screen --type=overlay fzf --reverse

# utils
# no need, because ctrl+shift is kitty_mod by default, now this config changed to alt.
# map kitty_mod+f2     edit_config_file
# map kitty_mod+f5     load_config_file

# clear the terminal screen
map kitty_mod+k     combine : clear_terminal scrollback active : send_text normal,application \x0c

# jump to beginning and end of word
map kitty_mod+left  send_text all \x1b\x62
map kitty_mod+right send_text all \x1b\x66

# open url with hints
map kitty_mod+e open_url_with_hints
