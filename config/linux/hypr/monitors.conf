# See https://wiki.hyprland.org/Configuring/Monitors/

#              ┌───────────────────┐
#              │                   │
#              │  HS 140KP (ID 1)  │
#              │                   │
#  ┌───────────└───────────────────┘──────┐
#  │                      │               │
#  │                      │  eDP-1 (ID 0) │
#  │     LG 4K (ID 2)     │               │
#  │                      │───────────────┘
#  │                      │
#  └──────────────────────┘

# internal display (ID 0)
monitor = eDP-1, 2880x1800@120, 0x0, 1.6

# external displays

## LG 4K (ID 2) / DP-2
monitor = desc:LG Electronics LG HDR 4K 0x0000323A, 3840x2160@60, -2560x0, 1.5

## HS 140KP (ID 1) / HDMI-A-1
monitor = desc:YTH HS-140KP, 3840x2160@60, -960x-1080, 2

# Special monitor workspace
workspace = name:Main, monitor:eDP-1, default:true, 1
workspace = name:Media, monitor:HDMI-A-1, default:true, 11
workspace = name:Browsers, monitor:DP-2, default:true, 21
