## icyleaf

# disable opacity for google chrome
windowrule = opacity 1.0 override 1 override 1 override, class:^google-chrom(e|ium)$
windowrule = opacity 1.0 override 1 override 1 override, class:^libreoffice(.*)$

# fix jetbrans IDE (Android Studio)
# https://github.com/hyprwm/Hyprland/issues/2412
windowrule = nofocus, class:^(jetbrains-(?!toolbox)), floating:1, title:^(win\d+)$

windowrule = stayfocused,class:^jetbrains*,floating:1
windowrule = stayfocused,class:^com.intellij*,floating:1
# windowrule = windowdance,class:^(jetbrains-.*) # allows IDE to move child windows
# windowrule = windowdance,class:^com.intellij*) # allows IDE to move child windows

# windowrule = float,class:^(Emulator)$
# windowrule = float,size 421 936,class:^(Emulator)$,title:(Medium_Phone_API_35)

# fix for the autoclosing filter modal (use stayfocused will force for all monitors)
# windowrule = tile,class:^(DBeaver)$
# source https://github.com/romanstingler/dotfiles/blob/80b5e7522d0c32802ff670d10c36c9b5228a3e1e/.config/hypr/hyprland.conf.bak#L215
windowrule = noinitialfocus,class:^DBeaver,floating:1

# fullscreen for telegram media playing
windowrule = fullscreen,class:^(org.telegram.desktop)$,title:^(Media viewer)$

# mission center
windowrule = size 1130 720,class:^(io.missioncenter.MissionCenter)$

# Davinci resolve
windowrule = maximize, class:^(resolve)$, title:^(.*DaVinci Resolve.*)$

windowrule = tile,class:^(wechat)$
windowrule = tile,class:^(wechat)$,title:^(朋友圈)$

# zeal
windowrule = float, class:^(org.zealdocs.zeal)$
windowrule = size 1130 720, class:^(org.zealdocs.zeal)$

# minecraft
windowrule = fullscreen, class:^(Minecraft.*)$

# app in workspaces
# windowrule = workspace 5, class:^(DBeaver)$
windowrule = workspace 8, class:^(thunderbird)$
windowrule = workspace 9, class:^(org.telegram.desktop)$
windowrule = workspace 9, class:^(wechat)$
windowrule = workspace 10, class:^(discord)$
windowrule = workspace 10, class:^(vesktop)$
