# Variables
$scrPath = /home/icyleaf/.local/lib/hyde
$mainMod = SUPER

# Application bindings
$terminal = uwsm app -- kitty
$browser = google-chrome-stable

$l=Launcher
$d=[$l|Apps]
bindd = $mainMod, T, $d Terminal, exec, $terminal
bindd = $mainMod SHIFT, T, $d Terminal (wezterm), exec, wezterm
bindd = $mainMod, F, $d File manager, exec, uwsm app -- nautilus --new-window
bindd = $mainMod, B, $d Browser, exec, $browser
bindd = $mainMod SHIFT, B, Firefox Browser, exec, firefox
bindd = $mainMod, C, $d Editor, exec, code
bindd = $mainMod, D, $d discord, exec, vesktopq
bindd = $mainMod, F1, $d Activity, exec, $terminal -e btop
bindd = $mainMod, L, $d Lock screen, exec, hyprlock
bindd = $mainMod, N, $d Neovim, exec, $terminal -e nvim
bindd = $mainMod, D, $d Docker, exec, $terminal -e lazydocker
bindd = $mainMod Alt, Comma, $d Gauntlet Launcher, exec, gauntlet
bindd = $mainMod, slash, Passwords, exec, uwsm app -- flatpak run com.bitwarden.desktop

# Screenshots
bindd = , Page_Down, Screenshot of region, exec, omarchy-cmd-screenshot
bindd = SHIFT, Page_Down, Screenshot of window, exec, omarchy-cmd-screenshot window
bindd = CTRL, Page_Down, Screenshot of display, exec, omarchy-cmd-screenshot output

# Screen recordings
bindd = ALT, Page_Down, Screen record a region, exec, omarchy-cmd-screenrecord
bindd = CTRL ALT, Page_Down, Screen record display, exec, omarchy-cmd-screenrecord output

# Color picker
bindd = $mainMod, Page_Down, Color picker, exec, pkill hyprpicker || hyprpicker -a

# Clipboard manager
bindd = $mainMod SHIFT, V, Clipboard, exec, omarchy-launch-walker -m clipboard
# bindd = $mainMod SHIFT, C, Clipboard new manager, exec, /home/icyleaf/cliphist-walker.sh history
# bindd = $mainMod SHIFT, V, Clipboard manager, exec, $scrPath/cliphist.sh -c

# Noticiations
bindd = $mainMod, Comma, Notifications, exec, swaync-client -t -sw

# Web apps
bindd = $mainMod SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
bindd = $mainMod SHIFT, X, Twitter, exec, omarchy-launch-webapp "https://twitter.com/"
# bindd = SUPER SHIFT, A, Grok, exec, omarchy-launch-webapp "https://grok.com"
# bindd = $mainMod, Y, YouTube, exec, omarchy-launch-webapp "https://youtube.com/"
# bindd = SUPER SHIFT, G, WhatsApp, exec, omarchy-launch-webapp "https://web.whatsapp.com/"

# Move/Resize focused window

# Close windows
bindd = $mainMod, W, Close active window, killactive,
bindd = CTRL ALT, DELETE, Close all Windows, exec, omarchy-cmd-close-all-windows

# Control tiling
bindd = $mainMod, J, Toggle split, togglesplit, # dwindle
bindd = $mainMod, P, Pseudo window, pseudo, # dwindle

$d=[$wm|Move & Resize with mouse]
binddm = $mainMod, mouse:272, $d hold to move window, movewindow
binddm = $mainMod, mouse:273, $d hold to resize window, resizewindow
binddm = $mainMod, Z, $d hold to move window , movewindow
binddm = $mainMod, X, $d hold to resize window, resizewindow

$ws=Workspaces
$d=[$ws|Navigation]
unbind = $mainMod, code:10
unbind = $mainMod, code:11
unbind = $mainMod, code:12
unbind = $mainMod, code:13
unbind = $mainMod, code:14
unbind = $mainMod, code:15
unbind = $mainMod, code:16
unbind = $mainMod, code:17
unbind = $mainMod, code:18
unbind = $mainMod, code:19

bindd = $mainMod, code:10, $d Switch to workspace 1 ,exec, $scrPath/workspace-switch.sh switch 1
bindd = $mainMod, code:11, $d Switch to workspace 2 ,exec, $scrPath/workspace-switch.sh switch 2
bindd = $mainMod, code:12, $d Switch to workspace 3 ,exec, $scrPath/workspace-switch.sh switch 3
bindd = $mainMod, code:13, $d Switch to workspace 4 ,exec, $scrPath/workspace-switch.sh switch 4
bindd = $mainMod, code:14, $d Switch to workspace 5 ,exec, $scrPath/workspace-switch.sh switch 5
bindd = $mainMod, code:15, $d Switch to workspace 6 ,exec, $scrPath/workspace-switch.sh switch 6
bindd = $mainMod, code:16, $d Switch to workspace 7 ,exec, $scrPath/workspace-switch.sh switch 7
bindd = $mainMod, code:17, $d Switch to workspace 8 ,exec, $scrPath/workspace-switch.sh switch 8
bindd = $mainMod, code:18, $d Switch to workspace 9 ,exec, $scrPath/workspace-switch.sh switch 9
bindd = $mainMod, code:19, $d Switch to workspace 10 ,exec, $scrPath/workspace-switch.sh switch 10

unbind = $mainMod SHIFT, code:10
unbind = $mainMod SHIFT, code:11
unbind = $mainMod SHIFT, code:12
unbind = $mainMod SHIFT, code:13
unbind = $mainMod SHIFT, code:14
unbind = $mainMod SHIFT, code:15
unbind = $mainMod SHIFT, code:16
unbind = $mainMod SHIFT, code:17
unbind = $mainMod SHIFT, code:18
unbind = $mainMod SHIFT, code:19

bindd = $mainMod SHIFT, code:10, $d Move to workspace 1 ,exec, $scrPath/workspace-switch.sh move 1
bindd = $mainMod SHIFT, code:11, $d Move to workspace 2 ,exec, $scrPath/workspace-switch.sh move 2
bindd = $mainMod SHIFT, code:12, $d Move to workspace 3 ,exec, $scrPath/workspace-switch.sh move 3
bindd = $mainMod SHIFT, code:13, $d Move to workspace 4 ,exec, $scrPath/workspace-switch.sh move 4
bindd = $mainMod SHIFT, code:14, $d Move to workspace 5 ,exec, $scrPath/workspace-switch.sh move 5
bindd = $mainMod SHIFT, code:15, $d Move to workspace 6 ,exec, $scrPath/workspace-switch.sh move 6
bindd = $mainMod SHIFT, code:16, $d Move to workspace 7 ,exec, $scrPath/workspace-switch.sh move 7
bindd = $mainMod SHIFT, code:17, $d Move to workspace 8 ,exec, $scrPath/workspace-switch.sh move 8
bindd = $mainMod SHIFT, code:18, $d Move to workspace 9 ,exec, $scrPath/workspace-switch.sh move 9
bindd = $mainMod SHIFT, code:19, $d Move to workspace 10 ,exec, $scrPath/workspace-switch.sh move 10

bindd = $mainMod CTRL, code:10, $d Move to workspace 1 ,exec, $scrPath/workspace-switch.sh movesilent 1
bindd = $mainMod CTRL, code:11, $d Move to workspace 2 ,exec, $scrPath/workspace-switch.sh movesilent 2
bindd = $mainMod CTRL, code:12, $d Move to workspace 3 ,exec, $scrPath/workspace-switch.sh movesilent 3
bindd = $mainMod CTRL, code:13, $d Move to workspace 4 ,exec, $scrPath/workspace-switch.sh movesilent 4
bindd = $mainMod CTRL, code:14, $d Move to workspace 5 ,exec, $scrPath/workspace-switch.sh movesilent 5
bindd = $mainMod CTRL, code:15, $d Move to workspace 6 ,exec, $scrPath/workspace-switch.sh movesilent 6
bindd = $mainMod CTRL, code:16, $d Move to workspace 7 ,exec, $scrPath/workspace-switch.sh movesilent 7
bindd = $mainMod CTRL, code:17, $d Move to workspace 8 ,exec, $scrPath/workspace-switch.sh movesilent 8
bindd = $mainMod CTRL, code:18, $d Move to workspace 9 ,exec, $scrPath/workspace-switch.sh movesilent 9
bindd = $mainMod CTRL, code:19, $d Move to workspace 10 ,exec, $scrPath/workspace-switch.sh movesilent 10

# Move/Switch to special workspace (scratchpad)
$d=[$ws|Navigation|Special workspace]
bindd = $mainMod Shift, S, $d move to scratchpad  , movetoworkspace, special
bindd = $mainMod Alt, S, $d move to scratchpad (silent) , movetoworkspacesilent, special
bindd = $mainMod, S, $d toggle scratchpad ,  togglespecialworkspace

$util=Utilities
$d=[$util|System]
bindd = $mainMod SHIFT, F12, $d toggle waybar and reload config, exec, killall waybar || waybar
bindd = $mainMod SHIFT, Delete, $d kill hyprland session, exit
