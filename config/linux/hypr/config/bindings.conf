bindd = SUPER CTRL, code:19, Move to workspace 10 ,exec, $scrPath/workspace-switch.sh movesilent 10

# Move/Switch to special workspace (scratchpad)
bindd = SUPER Shift, S, move to scratchpad, movetoworkspace, special
bindd = SUPER Alt, S, move to scratchpad (silent) , movetoworkspacesilent, special
bindd = SUPER, S, toggle scratchpad,  togglespecialworkspace

bindd = SUPER SHIFT, F12, toggle waybar and reload config, exec, killall waybar || waybar
bindd = SUPER SHIFT, Delete, kill hyprland session, exit
bindd = SUPER SHIFT, F5, restart fcitx5, exec, fcitx5 --replace -d
