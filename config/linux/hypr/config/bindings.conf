# Variables
$scrPath = /home/icyleaf/.config/hypr/scripts

bindd = SUPER SHIFT, T, Tmux, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)" tmux new
bindd = SUPER, T, Terminal, exec, uwsm-app -- xdg-terminal-exec --dir="$(omarchy-cmd-terminal-cwd)"
bindd = SUPER, B, Browser, exec, omarchy-launch-browser
bindd = SUPER, F, File manager, exec, nemo
bindd = SUPER, E, Editor, exec, code
bindd = SUPER, D, discord, exec, vesktop
# bindd = SUPER SHIFT, W, wechat, exec, wechat

bindd = SUPER, L, Lock screen, exec, hyprlock
bindd = SUPER SHIFT, L, Sleep, exec, hyprctl dispatch dpms off
bindd = SUPER ALT, D, Docker, exec, omarchy-launch-tui lazydocker
bindd = SUPER, F1, Activity, exec, omarchy-launch-tui btop
# bindd = SUPER Alt, Comma, Gauntlet Launcher, exec, gauntlet

bindd = SUPER, slash, Passwords, exec, uwsm app -- flatpak run com.bitwarden.desktop

# Captures
bindd = SUPER, PRINT, Screenshot with editing, exec, omarchy-cmd-screenshot
bindd = SUPER SHIFT, PRINT, Screenshot to clipboard, exec, omarchy-cmd-screenshot smart clipboard
bindd = SUPER CTRL, PRINT, Extract text (OCR) from screenshot, exec, omarchy-capture-text-extraction

# Screen recordings
bindd = SUPER ALT, PRINT, Screen record a region, exec, omarchy-menu screenrecord

# Color picker
bindd = SUPER CTRL, PRINT, Color picker, exec, pkill hyprpicker || hyprpicker -a

# Clipboard manager
bindd = SUPER SHIFT, V, Clipboard, exec, omarchy-launch-walker -m clipboard

# Copy / Paste
# ~/.local/share/omarchy/default/hypr/bindings/clipboard.conf
bindd = SUPER, C, Universal copy, sendshortcut, CTRL, Insert,
bindd = SUPER, V, Universal paste, sendshortcut, SHIFT, Insert,
# bindd = SUPER, X, Universal cut, sendshortcut, CTRL, X,
bindd = SUPER CTRL, V, Clipboard manager, exec, omarchy-launch-walker -m clipboard

# Noticiations
bindd = SUPER, Comma, Notifications, exec, swaync-client -t -sw

# Transcoding
bindd = SUPER CTRL, PERIOD, Transcode, exec, omarchy-transcode

# Reminders
bindd = SUPER SHIFT, R, Set reminder, exec, omarchy-menu reminder-set
bindd = SUPER SHIFT ALT, R, Show reminders, exec, omarchy-reminder show
bindd = SUPER SHIFT CTRL, R, Clear reminders, exec, omarchy-reminder clear

# Waybar-less information
bindd = SUPER CTRL ALT, T, Show time, exec, notify-send -u low "    $(date +"%A %H:%M  ·  %d %B %Y  ·  Week %V")"
bindd = SUPER CTRL ALT, B, Show battery remaining, exec, notify-send -u low "$(omarchy-battery-status)"
bindd = SUPER CTRL ALT, W, Show weather, exec, notify-send -u low "$(omarchy-weather-status)"


# Web apps
# bindd = SUPER SHIFT, A, ChatGPT, exec, omarchy-launch-webapp "https://chatgpt.com"
# bindd = SUPER SHIFT, X, Twitter, exec, omarchy-launch-webapp "https://twitter.com/"
bindd = SUPER SHIFT, B, BiliBili, exec, omarchy-launch-webapp "https://www.bilibili.com/"

# Move/Resize focused window

# Close windows
bindd = SUPER, W, Close active window, killactive,
bindd = CTRL ALT, DELETE, Close all Windows, exec, omarchy-cmd-close-all-windows

# Control tiling
bindd = SUPER, U, Toggle floating, togglefloating,
# bindd = SUPER, J, Toggle split, togglesplit, # dwindle
bindd = SUPER, P, Pseudo window, pseudo, # dwindle

binddm = SUPER, mouse:272, hold to move window, movewindow
binddm = SUPER, mouse:273, hold to resize window, resizewindow
binddm = SUPER, Z, hold to move window , movewindow
binddm = SUPER, X, hold to resize window, resizewindow

