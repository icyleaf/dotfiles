bindd = SUPER CTRL, code:14, Move to workspace 5 ,exec, $scrPath/workspace-switch.sh movesilent 5
bindd = SUPER CTRL, code:15, Move to workspace 6 ,exec, $scrPath/workspace-switch.sh movesilent 6
bindd = SUPER CTRL, code:16, Move to workspace 7 ,exec, $scrPath/workspace-switch.sh movesilent 7
bindd = SUPER CTRL, code:17, Move to workspace 8 ,exec, $scrPath/workspace-switch.sh movesilent 8
