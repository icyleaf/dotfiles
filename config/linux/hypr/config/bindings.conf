bindd = SUPER SHIFT, code:19, Move to workspace 10 ,exec, $scrPath/workspace-switch.sh move 10

bindd = SUPER CTRL, code:10, Move to workspace 1 ,exec, $scrPath/workspace-switch.sh movesilent 1
