font_family           Cascadia Mono
bold_font             auto
italic_font           auto
bold_italic_font      auto
enable_audio_bell     no
font_size             11.0
window_padding_width  8.0

draw_minimal_borders    yes
inactive_text_alpha     0.7
hide_window_decorations no

# default layout is vertical splits only
enabled_layouts splits
window_border_width 2px
enable_audio_bell no

# tab bar styles
tab_bar_edge top
tab_title_template "{fmt.fg.c2c2c2}{title}"
active_tab_title_template "{fmt.fg._fff}{title}"
tab_bar_style slant
scrollback_lines 4000

include theme.conf
#background_opacity 0.60
#hide_window_decorations yes
#confirm_os_window_close 0

include keybindings.conf

# initially empty, to be configured by user and remains static
include userprefs.conf

# Note: as userprefs.conf is included at the end, settings configured in this file will override the defaults
